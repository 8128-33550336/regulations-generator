name: Publish image
run-name: Publish image

permissions:
  contents: read
  packages: write
  actions: write

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - package.json
      - package-lock.json
      - tsconfig.json
      - resources/**
      - src/**
      - .github/workflows/publish-image.yaml

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_GITHUB_REPOSITORY=${{ github.repository }}
            BUILD_GITHUB_SHA=${{ github.sha }}
            BUILD_GITHUB_SERVER_URL=${{ github.server_url }}
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Trigger dispatch
        env:
          GITHUB_TOKEN: ${{ secrets.REG_TESTS_TOKEN }}
        run: |
            curl -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Content-Type: application/json" \
              https://api.github.com/repos/8128-33550336/reg-tests/actions/workflows/publish.yaml/dispatches \
              -d '{"ref":"main"}'
